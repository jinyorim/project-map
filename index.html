<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Hyorim Jin — Project Mapping</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body, #root { width:100%; height:100%; }
  button { cursor:pointer; transition:all 0.2s; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useCallback, useMemo } = React;

const PROJECTS = [
  { id:1, name:"MOZZI", sub:"초음파 가습기", year:2021, star:false, img:"1.png",
    mx:22, my:22, tags:["제품디자인"], type:"사이드PJ" },
  { id:2, name:"카페 벤치", sub:"테이블 벤치", year:2021, star:false, img:"2.png",
    mx:18, my:16, tags:["제품디자인"], type:"사이드PJ" },
  { id:3, name:"Siege", sub:"스탠딩 조명", year:2021, star:false, img:"",
    mx:26, my:28, tags:["제품디자인"], type:"학부과제" },
  { id:4, name:"MOR", sub:"시각장애인 유축기", year:2021, star:false, img:"4.jpg",
    mx:42, my:42, tags:["제품디자인","UX·리서치"], type:"공모전" },
  { id:5, name:"GLIGHT", sub:"캠핑 화로+랜턴", year:2022, star:false, img:"5.png",
    mx:35, my:25, tags:["제품디자인"], type:"공모전" },
  { id:6, name:"PLAYROUND", sub:"알파세대 카메라", year:2022, star:false, img:"6.jpg",
    mx:58, my:45, tags:["UX·리서치","기획·PM"], type:"학부과제" },
  { id:7, name:"MEALBOX", sub:"서빙로봇 PUI", year:2022, star:true, img:"7.jpg",
    mx:48, my:65, tags:["UX·리서치","제품디자인"], type:"학부과제" },
  { id:8, name:"ETRI", sub:"Ceif + K가드", year:2022, star:true, img:"8.jpg",
    mx:65, my:30, tags:["제품디자인","UX·리서치","데이터·R&D"], type:"인턴" },
  { id:9, name:"Sta.tt", sub:"센터콘솔", year:2022, star:false, img:"9.png",
    mx:62, my:55, tags:["UX·리서치","제품디자인"], type:"학부과제" },
  { id:10, name:"터닝포인트", sub:"주식 앱", year:2023, star:false, img:"10.jpg",
    mx:42, my:35, tags:["UX·리서치"], type:"사이드PJ" },
  { id:11, name:"POLONY", sub:"공간브랜딩", year:2024, star:false, img:"11.png",
    mx:25, my:50, tags:["브랜드·전시","기획·PM"], type:"학부과제" },
  { id:12, name:"PUFFLUP", sub:"세라믹 와인잔", year:2024, star:false, img:"12.png",
    mx:15, my:18, tags:["제품디자인","브랜드·전시"], type:"학부과제" },
  { id:13, name:"AYOLKER", sub:"커피 브랜딩+전시", year:2024, star:true, img:"13.png",
    mx:28, my:30, tags:["브랜드·전시","제품디자인","기획·PM"], type:"산학전시" },
  { id:14, name:"STAGE", sub:"캐비닛 가구", year:2024, star:true, img:"14.png",
    mx:30, my:42, tags:["제품디자인","데이터·R&D"], type:"졸업전시" },
  { id:15, name:"BELLS", sub:"운동 디바이스", year:2024, star:true, img:"15.jpg",
    mx:58, my:28, tags:["제품디자인","UX·리서치","기획·PM"], type:"졸업전시" },
  { id:16, name:"BitGeul", sub:"필사 제품기획", year:2024, star:false, img:"",
    mx:30, my:62, tags:["기획·PM","브랜드·전시"], type:"학부과제" },
  { id:17, name:"현대차", sub:"인테리어 조명", year:2025, star:false, img:"16.png",
    mx:60, my:72, tags:["데이터·R&D","UX·리서치"], type:"산학협력" },
  { id:18, name:"자율주행버스", sub:"긴급 디스플레이", year:2025, star:false, img:"17.png",
    mx:72, my:75, tags:["데이터·R&D","UX·리서치"], type:"국가R&D" },
  { id:19, name:"KCL", sub:"헬스기구 안전기준", year:2025, star:false, img:"",
    mx:86, my:82, tags:["데이터·R&D"], type:"국가R&D" },
  { id:20, name:"빅데이터", sub:"감성 비교분석", year:2025, star:true, img:"20.png",
    mx:76, my:82, tags:["데이터·R&D"], type:"대학원" },
];

const TAGS = [
  { id:"시간순", label:"시간순" },
  { id:"제품디자인", label:"제품디자인" },
  { id:"UX·리서치", label:"UX·리서치" },
  { id:"브랜드·전시", label:"브랜드·전시" },
  { id:"데이터·R&D", label:"데이터·R&D" },
  { id:"기획·PM", label:"기획·PM" },
];

const YEARS = [2021, 2022, 2023, 2024, 2025];

function ProjectMap() {
  const [activeTag, setActiveTag] = useState(null);
  const [hovered, setHovered] = useState(null);
  const isChrono = activeTag === "시간순";

  const chronoPos = useMemo(() => {
    const pos = {};
    YEARS.forEach((yr, ci) => {
      const yps = PROJECTS.filter(p =>
        typeof p.year === "number" ? p.year === yr : String(p.year).includes(String(yr))
      );
      yps.forEach((p, ri) => {
        pos[p.id] = { x: 6 + ci * 19, y: 10 + ri * (78 / Math.max(yps.length, 1)) };
      });
    });
    return pos;
  }, []);

  const resolvedPos = useMemo(() => {
    const items = PROJECTS.map(p => ({ id:p.id, x:p.mx, y:p.my, star:p.star }));
    for (let pass = 0; pass < 8; pass++) {
      for (let i = 0; i < items.length; i++) {
        for (let j = i + 1; j < items.length; j++) {
          const a = items[i], b = items[j];
          const needX = (a.star || b.star) ? 6.5 : 5;
          const needY = (a.star || b.star) ? 12 : 10;
          const dx = b.x - a.x, dy = b.y - a.y;
          const adx = Math.abs(dx), ady = Math.abs(dy);
          if (adx < needX && ady < needY) {
            const overlapX = needX - adx, overlapY = needY - ady;
            if (overlapX < overlapY) {
              const push = overlapX / 2 + 0.2;
              b.x += dx >= 0 ? push : -push;
              a.x -= dx >= 0 ? push : -push;
            } else {
              const push = overlapY / 2 + 0.2;
              b.y += dy >= 0 ? push : -push;
              a.y -= dy >= 0 ? push : -push;
            }
          }
        }
      }
    }
    const map = {};
    items.forEach(it => { map[it.id] = { x:it.x, y:it.y }; });
    return map;
  }, []);

  const getPos = useCallback((p) => {
    if (isChrono && chronoPos[p.id]) return chronoPos[p.id];
    return resolvedPos[p.id] || { x:p.mx, y:p.my };
  }, [isChrono, chronoPos, resolvedPos]);

  const isHi = useCallback((p) => {
    if (!activeTag || isChrono) return true;
    return p.tags.includes(activeTag);
  }, [activeTag, isChrono]);

  const S = 60, SS = 72;

  return (
    <div style={{
      width:"100%", maxWidth:1440, margin:"0 auto",
      aspectRatio:"16/9", background:"#fff",
      fontFamily:"'Pretendard',sans-serif",
      position:"relative", overflow:"hidden",
    }}>
      {/* Header */}
      <div style={{
        position:"relative", zIndex:10, padding:"14px 28px 2px",
        display:"flex", justifyContent:"space-between", alignItems:"flex-end",
      }}>
        <div>
          <div style={{
            fontSize:18, fontWeight:300, color:"#000",
            fontFamily:"'Pretendard'", letterSpacing:"0.06em",
          }}>Hyorim Jin</div>
          <div style={{
            fontSize:10, color:"#999", marginTop:1,
            fontFamily:"'Pretendard'", fontWeight:300,
          }}>사람과 기술 사이의 블루프린트를 그리는 프로덕트 디자이너 — Project Mapping 2021–2026</div>
        </div>
      </div>

      {/* Tags */}
      <div style={{
        position:"relative", zIndex:10, padding:"4px 28px 6px",
        display:"flex", gap:6, alignItems:"center",
      }}>
        <button onClick={() => setActiveTag(null)} style={{
          padding:"4px 12px", fontSize:11, fontWeight:!activeTag?500:400,
          border:!activeTag?"1.5px solid #000":"1px solid #ddd",
          background:!activeTag?"#000":"#fff",
          color:!activeTag?"#fff":"#333",
          fontFamily:"'Pretendard'",
        }}>전체</button>
        {TAGS.filter(t=>t.id!=="시간순").map(t => {
          const active = activeTag===t.id;
          const count = PROJECTS.filter(p=>p.tags.includes(t.id)).length;
          return (
            <button key={t.id} onClick={()=>setActiveTag(active?null:t.id)} style={{
              padding:"4px 12px", fontSize:11, fontWeight:active?500:400,
              border:active?"1.5px solid #000":"1px solid #ddd",
              background:active?"#000":"#fff",
              color:active?"#fff":"#333",
              fontFamily:"'Pretendard'",
              display:"flex",alignItems:"center",gap:5,
            }}>
              {t.label}
              <span style={{fontSize:9,opacity:0.4,fontFamily:"'IBM Plex Mono'"}}>{count}</span>
            </button>
          );
        })}
        <div style={{flex:1}}/>
        <button onClick={()=>setActiveTag(isChrono?null:"시간순")} style={{
          padding:"4px 12px", fontSize:11, fontWeight:isChrono?500:400,
          border:isChrono?"1.5px solid #000":"1px solid #ddd",
          background:isChrono?"#000":"#fff",
          color:isChrono?"#fff":"#333",
          fontFamily:"'Pretendard'",
        }}>시간순</button>
      </div>

      {/* Map */}
      <div style={{
        position:"relative", margin:"0 28px",
        height:"calc(100% - 80px)",
      }}>
        {/* Axes */}
        {!isChrono && (
          <svg style={{position:"absolute",inset:0,width:"100%",height:"100%",pointerEvents:"none",zIndex:1}}>
            <line x1="8%" y1="50%" x2="92%" y2="50%" stroke="#000" strokeWidth="0.8"/>
            <line x1="50%" y1="10%" x2="50%" y2="88%" stroke="#000" strokeWidth="0.8"/>
            <circle cx="8%" cy="50%" r="4" fill="#000"/>
            <circle cx="92%" cy="50%" r="4" fill="#000"/>
            <circle cx="50%" cy="10%" r="4" fill="#000"/>
            <circle cx="50%" cy="88%" r="4" fill="#000"/>
            <text x="2%" y="50.4%" fill="#000" fontSize="12" dominantBaseline="middle"
              fontFamily="'Pretendard'" fontWeight="400" letterSpacing="0.08em">감성/경험</text>
            <text x="98%" y="50.4%" fill="#000" fontSize="12" dominantBaseline="middle"
              fontFamily="'Pretendard'" fontWeight="400" letterSpacing="0.08em" textAnchor="end">기술/시스템</text>
            <text x="50%" y="5%" fill="#000" fontSize="12"
              fontFamily="'Pretendard'" fontWeight="400" letterSpacing="0.08em" textAnchor="middle">구현/실물</text>
            <text x="50%" y="94%" fill="#000" fontSize="12"
              fontFamily="'Pretendard'" fontWeight="400" letterSpacing="0.08em" textAnchor="middle">탐색/연구</text>
          </svg>
        )}

        {/* Chrono */}
        {isChrono && (
          <svg style={{position:"absolute",inset:0,width:"100%",height:"100%",pointerEvents:"none",zIndex:1}}>
            {YEARS.map((yr,i) => (
              <g key={yr}>
                <line x1={`${6+i*19}%`} y1="7%" x2={`${6+i*19}%`} y2="95%"
                  stroke="rgba(0,0,0,0.06)" strokeWidth="0.5"/>
                <text x={`${6+i*19}%`} y="5%" fill="rgba(0,0,0,0.5)" fontSize="14"
                  fontFamily="'Pretendard'" fontWeight="500" textAnchor="middle" letterSpacing="0.06em">
                  {yr}{yr===2025?"+":""}
                </text>
              </g>
            ))}
          </svg>
        )}

        {/* Cards */}
        {PROJECTS.map(p => {
          const pos = getPos(p);
          const highlighted = isHi(p);
          const isHov = hovered===p.id;
          const s = p.star ? SS : S;
          return (
            <div key={p.id}
              onMouseEnter={()=>setHovered(p.id)}
              onMouseLeave={()=>setHovered(null)}
              style={{
                position:"absolute",
                left:`${pos.x}%`, top:`${pos.y}%`,
                transform:`translate(-50%,-50%) scale(${isHov?1.08:1})`,
                width:s, height:s,
                zIndex:isHov?25:highlighted?10:3,
                opacity:highlighted?1:0.07,
                transition:"all 0.5s cubic-bezier(0.22,1,0.36,1)",
                cursor:"pointer",
              }}>
              <div style={{
                width:"100%", height:"100%",
                overflow:"hidden", position:"relative",
                boxShadow:isHov?"0 6px 20px rgba(0,30,100,0.2)":"0 1px 4px rgba(0,0,0,0.06)",
                transition:"box-shadow 0.3s",
              }}>
                {p.img ? (
                  <img src={p.img} alt={p.name} style={{width:"100%",height:"100%",objectFit:"cover"}}/>
                ) : (
                  <div style={{
                    width:"100%",height:"100%",
                    background:"linear-gradient(135deg, #f0f0f0 0%, #e4e4e4 100%)",
                    display:"flex",alignItems:"center",justifyContent:"center",
                    fontSize:p.star?18:13, fontWeight:300, color:"#999",
                    fontFamily:"'IBM Plex Mono'", opacity:0.6,
                  }}>{String(p.id).padStart(2,"0")}</div>
                )}
                <div style={{
                  position:"absolute", bottom:0, left:0, right:0,
                  background:"linear-gradient(transparent, rgba(0,15,50,0.82))",
                  padding:p.star?"14px 4px 4px":"10px 3px 3px",
                  textAlign:"center",
                }}>
                  <div style={{
                    fontSize:p.star?10:8, fontWeight:600, color:"#fff",
                    fontFamily:"'IBM Plex Mono'", letterSpacing:"-0.02em",
                  }}>{p.name}</div>
                </div>
              </div>
              <div style={{
                textAlign:"center", marginTop:3,
                fontSize:p.star?10:9,
                color:highlighted?"rgba(0,0,0,0.55)":"#ddd",
                fontFamily:"'Pretendard'", fontWeight:400, whiteSpace:"nowrap",
                transition:"color 0.3s",
              }}>{p.sub}</div>
              {isHov && (
                <div style={{
                  position:"absolute",
                  top:s+18, left:"50%", transform:"translateX(-50%)",
                  background:"#fff", color:"#000",
                  padding:"10px 16px", whiteSpace:"nowrap",
                  fontSize:11, zIndex:30,
                  boxShadow:"0 2px 12px rgba(0,0,0,0.12)",
                  border:"1px solid #e0e0e0",
                  textAlign:"center",
                }}>
                  <div style={{fontWeight:600,fontSize:12,marginBottom:4,color:"#000"}}>{p.name}</div>
                  <div style={{fontSize:10,marginBottom:6,color:"#888"}}>{p.sub}</div>
                  <div style={{fontSize:9,marginBottom:6,color:"#aaa"}}>{p.year} · {p.type}</div>
                  <div style={{display:"flex",gap:4,justifyContent:"center"}}>
                    {p.tags.map(t => (
                      <span key={t} style={{
                        padding:"2px 8px",background:"#f2f2f2",
                        fontSize:9,color:"#555",fontWeight:500,
                        border:"1px solid #e0e0e0",
                      }}>{t}</span>
                    ))}
                  </div>
                  {p.star && (
                    <div style={{color:"#000",fontSize:9,marginTop:6,fontWeight:500}}>★ 핵심 프로젝트</div>
                  )}
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<ProjectMap/>);
</script>
</body>
</html>
